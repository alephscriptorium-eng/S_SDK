<script type="text/javascript">
    RED.nodes.registerType('alephscript-ui-format', {
        category: 'AlephScript',
        color: '#9C27B0',
        defaults: {
            name: { value: "" },
            messageType: { value: "notification", required: true },
            // User input fields
            input: { value: "" },
            command: { value: "" },
            args: { value: "[]" },
            // Display update / notification fields
            displayType: { value: "info" },
            title: { value: "" },
            message: { value: "" },
            component: { value: "" },
            // Phase change fields
            phase: { value: "" },
            uiState: { value: "{}" },
            // Render request fields
            renderData: { value: "{}" },
            // UI event fields
            eventData: { value: "{}" },
            // Source configuration
            sourceId: { value: "" }
        },
        inputs: 1,
        outputs: 1,
        icon: "ui_ui.png",
        label: function() {
            return this.name || ("UI Format: " + this.messageType);
        },
        labelStyle: function() {
            return this.name ? "node_label_italic" : "";
        },
        oneditprepare: function() {
            // Show/hide fields based on message type
            $("#node-input-messageType").change(function() {
                var messageType = $(this).val();
                
                // Hide all field groups first
                $(".field-group").hide();
                
                // Show relevant fields based on type
                switch (messageType) {
                    case 'user_input':
                        $("#user-input-fields").show();
                        break;
                    case 'display_update':
                        $("#display-update-fields").show();
                        break;
                    case 'notification':
                        $("#notification-fields").show();
                        break;
                    case 'ui_event':
                        $("#ui-event-fields").show();
                        break;
                    case 'phase_change':
                        $("#phase-change-fields").show();
                        break;
                    case 'render_request':
                        $("#render-request-fields").show();
                        break;
                }
                
                // Update help text
                updateHelpText(messageType);
            }).trigger('change');
            
            function updateHelpText(messageType) {
                var helpTexts = {
                    'user_input': 'Formats user input messages with commands and arguments',
                    'display_update': 'Formats display updates for UI components',
                    'notification': 'Formats notification messages with titles and types',
                    'ui_event': 'Formats general UI events and interactions',
                    'phase_change': 'Formats phase transition messages with state',
                    'render_request': 'Formats render requests for UI components'
                };
                
                $("#message-type-help").text(helpTexts[messageType] || '');
            }
        }
    });
</script>

<script type="text/html" data-help-name="alephscript-ui-format">
    <p>Formats input data into proper <code>UIMessage</code> structures for AlephScript UI Channel.</p>
    
    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">any</span></dt>
        <dd>Raw data to be formatted. Can override configured fields.</dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">UIMessage</span></dt>
        <dd>Properly formatted UIMessage with id, timestamp, source, type, and payload</dd>
        <dt>topic <span class="property-type">string</span></dt>
        <dd>Set to "ui-channel-formatted"</dd>
        <dt>uiMessageType <span class="property-type">string</span></dt>
        <dd>The message type for routing</dd>
        <dt>displayType <span class="property-type">string</span></dt>
        <dd>Display type for UI styling</dd>
    </dl>

    <h3>Message Types</h3>
    <ul>
        <li><b>notification:</b> User notifications with titles and severity levels</li>
        <li><b>user_input:</b> User interactions (requires input, command, args)</li>
        <li><b>display_update:</b> Component updates (requires component, displayType, message)</li>
        <li><b>ui_event:</b> General UI events and interactions</li>
        <li><b>phase_change:</b> UI phase transitions (requires phase, uiState)</li>
        <li><b>render_request:</b> Component rendering (requires component, renderData)</li>
    </ul>

    <h3>Status Indicators</h3>
    <p>Node status color indicates message severity:</p>
    <ul>
        <li><span style="color: green;">●</span> Success / User Input</li>
        <li><span style="color: blue;">●</span> Info / Phase Change</li>
        <li><span style="color: orange;">●</span> Warning</li>
        <li><span style="color: red;">●</span> Error</li>
        <li><span style="color: grey;">●</span> Other Events</li>
    </ul>

    <h3>Usage</h3>
    <p>Connect this node between an Enhanced Bot Node and a UI Channel Node to automatically format user interface messages according to the UIMessage interface.</p>
</script>
