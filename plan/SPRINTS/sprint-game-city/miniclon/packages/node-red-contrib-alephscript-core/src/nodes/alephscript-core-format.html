<script type="text/html" data-template-name="alephscript-core-format">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="AlephScript Core Format">
    </div>
    <div class="form-row">
        <label for="node-input-channel"><i class="fa fa-random"></i> Channel</label>
        <select id="node-input-channel">
            <option value="room">room</option>
            <option value="app">app</option>
            <option value="sys">sys</option>
            <option value="ui">ui</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-messageType"><i class="fa fa-code"></i> Type</label>
        <input type="text" id="node-input-messageType" placeholder="message">
    </div>
    <div class="form-row">
        <label for="node-input-sourceId"><i class="fa fa-id-card"></i> Source</label>
        <input type="text" id="node-input-sourceId" placeholder="auto">
    </div>
    <div class="form-row">
        <label for="node-input-room"><i class="fa fa-comments"></i> Room</label>
        <input type="text" id="node-input-room" placeholder="ENGINE_THREADS">
    </div>
    <div class="form-row">
        <label for="node-input-event"><i class="fa fa-bolt"></i> Event</label>
        <input type="text" id="node-input-event" placeholder="NODE_RED_MESSAGE">
    </div>
    <div class="form-row">
        <label for="node-input-payloadTemplate"><i class="fa fa-file-code-o"></i> Payload JSON</label>
        <input type="text" id="node-input-payloadTemplate" placeholder="empty = msg.payload">
    </div>
</script>

<script type="text/html" data-help-name="alephscript-core-format">
    <p>Formats Node-RED messages into a common AlephScript envelope for app/sys/ui/room flows.</p>
</script>

<script type="text/javascript">
    RED.nodes.registerType('alephscript-core-format', {
        category: 'AlephScript',
        color: '#FF9800',
        defaults: {
            name: { value: '' },
            channel: { value: 'room', required: true },
            messageType: { value: 'message' },
            sourceId: { value: '' },
            room: { value: 'ENGINE_THREADS' },
            event: { value: 'NODE_RED_MESSAGE' },
            payloadTemplate: { value: '' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'parser-json.png',
        label: function() {
            return this.name || 'AlephScript Core Format';
        }
    });
</script>
